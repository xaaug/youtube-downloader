version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5300:5300"
    environment:
      - PORT=5300
      - NODE_ENV=production
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    env_file:
      - .env
    volumes:
      # Persist /tmp across restarts during local dev (optional)
      - tmp_data:/tmp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5300
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tmp_data: